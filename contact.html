<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اتصل بنا | SebdouPharma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="تواصل مع فريق SebdouPharma للاستفسار أو الدعم.">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0f9d58;
      --secondary: #1b5e20;
      --light: #f4fdf8;
      --dark: #0b3d2e;
    }

    * {
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
    }

    header {
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 44px;
      margin: 0;
    }

    header p {
      font-size: 20px;
      margin-top: 10px;
      opacity: 0.95;
    }

    .main {
      background: var(--light);
      color: #333;
      border-radius: 40px 40px 0 0;
      padding: 60px 20px;
      min-height: 60vh;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .contact-box {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      text-align: center;
    }

    .contact-box h2 {
      color: var(--primary);
      margin-bottom: 15px;
    }

    .contact-box p {
      font-size: 18px;
      line-height: 1.8;
    }

    .email {
      margin-top: 25px;
      font-size: 20px;
      background: #f1f8f4;
      display: inline-block;
      padding: 15px 30px;
      border-radius: 50px;
    }

    .email a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 600;
    }

    .back {
      margin-top: 40px;
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--primary);
      padding: 14px 35px;
      border-radius: 50px;
      transition: 0.3s;
    }

    .back:hover {
      background: var(--secondary);
    }

    footer {
      background: var(--dark);
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #d9f5e6;
    }
  </style>
</head>

<body>

<header>
  <h1>اتصل بنا</h1>
  <p>نحن هنا للإجابة على استفساراتكم</p>
</header>

<section class="main">
  <div class="container">
    <div class="contact-box">
      <h2>📩 تواصل معنا</h2>
      <p>
        إذا كانت لديك أي استفسارات، اقتراحات، أو ملاحظات بخصوص تطبيق
        <strong>SebdouPharma</strong>، لا تتردد في التواصل معنا عبر البريد الإلكتروني:
      </p>

      <div class="email">
        <a href="mailto:simply.awes@gmail.com">simply.awes@gmail.com</a>
      </div>

      <br><br>

      <a class="back" href="index.html">العودة إلى الصفحة الرئيسية</a>
    </div>
  </div>
</section>

<footer>
  © 2026 SebdouPharma – جميع الحقوق محفوظة
</footer>

</body>
</html>
